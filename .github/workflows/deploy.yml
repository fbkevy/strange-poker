name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          SP_BASE: /strange-poker/g-7f2ce1b09d4a4b6ea3d5c81f6e2a9b47/
      # Serve the app from an unguessable subpath; the repo root stays blank.
      - name: Stage site under GUID path
        run: |
          mkdir -p site/g-7f2ce1b09d4a4b6ea3d5c81f6e2a9b47
          cp -r dist/* site/g-7f2ce1b09d4a4b6ea3d5c81f6e2a9b47/
          printf '<!doctype html><title>Nothing here</title>' > site/index.html
          printf '<!doctype html><title>Not found</title>' > site/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
